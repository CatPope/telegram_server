{{define "content"}}
<div class="login-wrap">
  <div class="brand" style="margin-bottom:6px"><span class="brand-badge">A</span><span class="brand-name" style="color:#111827">adminui</span></div>
  <div class="card login-card">
    <h2 style="font-size:20px;margin:0 0 4px">운영자 로그인</h2>
    <p class="caption">관리자 콘솔에 접근하려면 인증이 필요합니다</p>
    {{if .Error}}<div class="banner banner-error">{{.Error}}</div>{{end}}
    <form method="post" action="/login">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
      <label class="field" for="password">비밀번호</label>
      <input type="password" id="password" name="password" autofocus required style="margin-bottom:18px">
      <hr style="border:none;border-top:1px solid #f3f4f6;margin:0 0 18px">
      <button type="submit" class="btn btn-primary btn-block">로그인</button>
    </form>
  </div>
  <p class="login-foot">모든 POST는 CSRF 검증 · 세션 없이 접근 시 303 → /login</p>
</div>
{{end}}
