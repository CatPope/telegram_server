{{define "base"}}
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Title}} — telegram_server Admin</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; margin: 0; display: flex; min-height: 100vh; }
  nav { width: 200px; flex-shrink: 0; background: #1f2937; color: #fff; padding: 1.5rem 1rem; }
  nav .brand { font-weight: 700; margin-bottom: 1.5rem; }
  nav a { display: block; color: #d1d5db; text-decoration: none; padding: 0.5rem 0; }
  nav a.active { color: #fff; font-weight: 600; }
  nav a.disabled { color: #6b7280; pointer-events: none; }
  main { flex: 1; padding: 2rem; }
  .card { border: 1px solid #6b7280; border-radius: 8px; padding: 1.25rem; max-width: 480px; }
  .status-ok { color: #16a34a; font-weight: 600; }
  .status-bad { color: #dc2626; font-weight: 600; }
  input { display: block; margin-bottom: 0.75rem; padding: 0.4rem; width: 100%; }
  button { padding: 0.5rem 1rem; cursor: pointer; }
  .error { color: #dc2626; margin-bottom: 1rem; }
  .success { color: #16a34a; margin-bottom: 1rem; }
  form.logout { margin: 0; }
  dt { color: #9ca3af; font-size: 0.85rem; }
  dd { margin: 0 0 1rem; }
  table { border-collapse: collapse; width: 100%; max-width: 900px; }
  th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid #6b7280; }
  fieldset { border: 1px solid #6b7280; border-radius: 8px; margin-bottom: 1rem; max-width: 480px; }
  fieldset label { display: block; font-weight: normal; margin-bottom: 0.25rem; }
  fieldset label input[type="checkbox"] { display: inline; width: auto; margin-right: 0.4rem; }
  select, textarea { display: block; margin-bottom: 0.75rem; padding: 0.4rem; width: 100%; }
  .actions { margin: 1rem 0; }
  a.button { display: inline-block; padding: 0.5rem 1rem; text-decoration: none; border: 1px solid #6b7280; border-radius: 4px; }
  code.key-plain { display: block; word-break: break-all; font-size: 1.05rem; padding: 0.5rem; border: 1px dashed #6b7280; border-radius: 4px; user-select: all; }
  form.inline { display: inline-flex; align-items: center; gap: 0.5rem; margin: 0; }
  form.inline label { font-weight: normal; }
  form.inline input[type="checkbox"] { display: inline; width: auto; margin: 0; }
</style>
</head>
<body>
{{if .Authenticated}}
<nav>
  <div class="brand">telegram_server</div>
  <a href="/" class="{{if eq .Active "dashboard"}}active{{end}}">Dashboard</a>
  <a href="/apps" class="{{if eq .Active "apps"}}active{{end}}">Apps</a>
  <a href="/users" class="{{if eq .Active "users"}}active{{end}}">Users</a>
  <a class="disabled">Audit</a>
  <form class="logout" method="post" action="/logout">
    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
    <button type="submit">Logout</button>
  </form>
</nav>
{{end}}
<main>
{{template "content" .}}
</main>
</body>
</html>
{{end}}
