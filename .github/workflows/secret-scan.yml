name: Secret Scan

on:
  pull_request:

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diff scanning)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets in PR diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr.diff

          # Generic key/token patterns
          if grep -P '(?i)(authorization|bearer|api[_-]?key|token|secret|password|ssh[_-]?key)\s*[:=]\s*['"'"'"]?[a-zA-Z0-9]{16,}' /tmp/pr.diff; then
            echo "::error::Potential secret detected in diff (generic pattern). Review the above lines."
            exit 1
          fi

          # Argon2id hash
          if grep -P '^\+.*\$argon2id\$' /tmp/pr.diff; then
            echo "::error::Argon2id hash detected in diff."
            exit 1
          fi

          # PEM private key
          if grep -P '^\+.*BEGIN .+ PRIVATE KEY' /tmp/pr.diff; then
            echo "::error::Private key block detected in diff."
            exit 1
          fi

          # Slack bot token
          if grep -P '^\+.*xoxb-' /tmp/pr.diff; then
            echo "::error::Slack bot token (xoxb-) detected in diff."
            exit 1
          fi

          # GitHub PAT
          if grep -P '^\+.*ghp_' /tmp/pr.diff; then
            echo "::error::GitHub PAT (ghp_) detected in diff."
            exit 1
          fi

          # Project-specific dev tokens
          if grep -P '^\+.*(tg_devadmin_|tg_devdev_|tg_devuser_)' /tmp/pr.diff; then
            echo "::error::Dev credential token detected in diff."
            exit 1
          fi

          echo "Secret scan passed — no patterns matched."

      - name: Check dev-credentials.md is not tracked
        run: |
          if git ls-files docs/dev-credentials.md | grep -q .; then
            echo "::error::docs/dev-credentials.md is tracked! Remove it from git with git rm --cached."
            exit 1
          fi
          echo "dev-credentials.md is not tracked — OK."
