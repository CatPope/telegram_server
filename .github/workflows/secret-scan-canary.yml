name: Secret Scan Canary (SEC-AC-1)

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  canary:
    name: canary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Plant canary secret file
        run: |
          cat > internal/auth/_canary_test_secret.go <<'EOF'
          // CANARY DO NOT COMMIT
          // var canary = "tg_devadmin_0123456789abcdef0123456789abcdef"
          EOF

      - name: Run secret-scan patterns against canary file
        id: scan
        run: |
          DETECTED=false

          # Generic key/token patterns
          if grep -P '(?i)(authorization|bearer|api[_-]?key|token|secret|password|ssh[_-]?key)\s*[:=]\s*['"'"'"]?[a-zA-Z0-9]{16,}' internal/auth/_canary_test_secret.go; then
            DETECTED=true
          fi

          # Project-specific dev tokens
          if grep -P '(tg_devadmin_|tg_devdev_|tg_devuser_)' internal/auth/_canary_test_secret.go; then
            DETECTED=true
          fi

          # Argon2id hash
          if grep -P '\$argon2id\$' internal/auth/_canary_test_secret.go; then
            DETECTED=true
          fi

          # PEM private key
          if grep -P 'BEGIN .+ PRIVATE KEY' internal/auth/_canary_test_secret.go; then
            DETECTED=true
          fi

          # Slack bot token
          if grep -P 'xoxb-' internal/auth/_canary_test_secret.go; then
            DETECTED=true
          fi

          # GitHub PAT
          if grep -P 'ghp_' internal/auth/_canary_test_secret.go; then
            DETECTED=true
          fi

          echo "detected=$DETECTED" >> "$GITHUB_OUTPUT"

      - name: Cleanup canary file
        if: always()
        run: rm -f internal/auth/_canary_test_secret.go

      - name: Fail if canary was NOT detected (SEC-AC-1)
        if: steps.scan.outputs.detected != 'true'
        run: |
          echo "::error::SEC-AC-1 FAILED: canary secret was NOT detected by secret-scan rules. Rules are inadequate - fix secret-scan.yml patterns."
          exit 1

      - name: Report success
        run: |
          echo "::notice::SEC-AC-1 PASSED - secret-scan rules correctly detected the canary secret."
