name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/catpope/telegram_server:${{ github.event.workflow_run.head_sha }}
            ghcr.io/catpope/telegram_server:latest

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: read
      packages: write
    steps:
      - name: SSH deploy via forced-command
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script: "true"
          # The forced-command on the remote authorized_keys runs:
          #   cd /opt/telegram_server && docker compose pull && docker compose up -d && curl -sf -m 10 http://localhost/healthz

      - name: Wait for /healthz (60s deadline, retry every 5s)
        id: healthz
        run: |
          deadline=$((SECONDS + 60))
          while [ $SECONDS -lt $deadline ]; do
            if curl -sf -m 5 "http://${{ secrets.DEPLOY_SSH_HOST }}/healthz"; then
              echo "healthz_ok=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 5
          done
          echo "healthz_ok=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Log in to GHCR (for imagetools)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx (for imagetools)
        uses: docker/setup-buildx-action@v3

      - name: Tag :previous (bootstrap + promote on success)
        if: steps.healthz.outputs.healthz_ok == 'true'
        run: |
          docker buildx imagetools create \
            -t ghcr.io/catpope/telegram_server:previous \
            ghcr.io/catpope/telegram_server:${{ github.event.workflow_run.head_sha }}

      - name: Annotate rollback instruction on /healthz failure
        if: steps.healthz.outputs.healthz_ok != 'true'
        run: |
          echo "::error::Deploy healthcheck failed. :previous tag left unchanged." \
               "See rollback procedure: docs/runbook.md#rollback"
          exit 1
