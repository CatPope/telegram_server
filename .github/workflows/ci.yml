name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Run golangci-lint
        # action @v7 은 golangci-lint v2 시리즈를 지원 (v6 는 v1 전용).
        # 설정 파일 .golangci.yml 도 version: "2" 로 마이그레이션됨.
        # v2/v1 자동 갱신으로 인한 재발 방지를 위해 lint version 도 핀.
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
          args: --timeout=5m

      - name: Report lint duration
        if: always()
        run: echo "::notice::ci lint duration $((SECONDS))s"

  test:
    name: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: telegram
          POSTGRES_PASSWORD: telegram
          POSTGRES_DB: telegram_server
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U telegram -d telegram_server"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Install golang-migrate
        run: |
          curl -sSL https://github.com/golang-migrate/migrate/releases/download/v4.18.1/migrate.linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin migrate

      - name: Run migrations
        run: |
          migrate -path migrations \
            -database "postgres://telegram:telegram@localhost:5432/telegram_server?sslmode=disable" \
            up

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: Report test duration
        if: always()
        run: echo "::notice::ci test duration $((SECONDS))s"
